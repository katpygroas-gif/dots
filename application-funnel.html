<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — The Full Pipe</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0A0A0A;
  color:#fff;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:440px;
  background:#141414;
  border:1px solid #2A2A2A;
  border-radius:20px;
  padding:34px;
  transition:max-width .25s ease;
}
.card.wide{max-width:640px;}

.top-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:20px;
  margin-bottom:22px;
}
.back-btn{
  background:none;
  border:none;
  color:#8A8A8A;
  font-size:14px;
  cursor:pointer;
  padding:0;
  visibility:hidden;
}
.back-btn.show{visibility:visible;}
.back-btn:hover{color:#fff;}
.step-label{
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#8A8A8A;
}

.progress-track{
  width:100%;
  height:6px;
  background:#2A2A2A;
  border-radius:99px;
  overflow:hidden;
  margin-bottom:30px;
}
.progress-fill{
  height:100%;
  background:#C8A96A;
  border-radius:99px;
  transition:width .3s ease;
  width:16.6%;
  box-shadow:0 0 12px rgba(200,169,106,0.7);
}
.progress-fill.flash{
  animation:progressFlash .5s ease;
}
@keyframes progressFlash{
  0%{box-shadow:0 0 12px rgba(200,169,106,0.7);}
  40%{box-shadow:0 0 24px rgba(200,169,106,1), 0 0 46px rgba(200,169,106,0.6);}
  100%{box-shadow:0 0 12px rgba(200,169,106,0.7);}
}

h2.question{
  font-size:20px;
  font-weight:800;
  line-height:1.35;
  margin-bottom:22px;
}

.options{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.option-btn{
  width:100%;
  text-align:left;
  padding:16px 20px;
  border-radius:12px;
  border:1px solid #2A2A2A;
  background:#0A0A0A;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:all .15s ease;
}
.option-btn:hover{border-color:#5A5A5A;}
.option-btn.selected{
  background:#fff;
  color:#000;
  border-color:#fff;
}

.field{margin-bottom:18px;}
.field label{
  display:block;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#8A8A8A;
  margin-bottom:8px;
}
.field input{
  width:100%;
  background:#0A0A0A;
  border:1px solid #2A2A2A;
  color:#fff;
  padding:14px 16px;
  border-radius:12px;
  font-family:'Inter',sans-serif;
  font-size:14.5px;
  outline:none;
  transition:border-color .2s ease;
}
.field input:focus{border-color:#fff;}
.field .err{
  color:#8A8A8A;
  font-size:12px;
  margin-top:6px;
}

.submit-btn{
  width:100%;
  background:#fff;
  color:#000;
  border:none;
  padding:17px;
  border-radius:12px;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  margin-top:6px;
  transition:background .2s ease;
}
.submit-btn:hover{background:#D6D6D6;}

.confirm{
  text-align:center;
}
.check-circle{
  width:56px;height:56px;
  border:1px solid #3A3A3A;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  font-size:24px;
}
.confirm h2{
  font-size:20px;
  font-weight:800;
  margin-bottom:8px;
}
.confirm p{
  color:#8A8A8A;
  font-size:14px;
  margin-bottom:22px;
}
.calendar-btn{
  display:inline-block;
  width:100%;
  background:#fff;
  color:#000;
  font-weight:800;
  font-size:15px;
  padding:17px;
  border-radius:12px;
  text-decoration:none;
  transition:background .2s ease;
  box-sizing:border-box;
}
.calendar-btn:hover{background:#D6D6D6;}

.step{display:none;}
.step.active{display:block;}
</style>
</head>
<body>

<div class="card" id="card">

  <div class="top-row" id="topRow">
    <button class="back-btn" id="backBtn">&larr; Back</button>
    <span class="step-label" id="stepLabel">Step 1 of 6</span>
  </div>
  <div class="progress-track" id="progressTrack">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div id="questionArea"></div>

  <!-- Contact step -->
  <form id="contactForm" class="step">
    <h2 class="question">Last step. Where should we reach you?</h2>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fName" placeholder="Jordan Reyes">
      <div class="err" id="errName"></div>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="fPhone" placeholder="(555) 000-0000">
      <div class="err" id="errPhone"></div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="fEmail" placeholder="jordan@reyesrestoration.com">
      <div class="err" id="errEmail"></div>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Apply Now</button>
    <div class="err" id="errSubmit" style="text-align:center;margin-top:10px;"></div>
  </form>

  <!-- Confirmation -->
  <div class="step confirm" id="confirmStep">
    <div class="check-circle">&#10003;</div>
    <h2>Application received.</h2>
    <p>We'll be in touch within 24 hours. Want to skip ahead and lock in a time now?</p>
    <a class="calendar-btn" href="https://calendly.com/3dot/full-pipe-strategy-call" target="_blank" rel="noopener noreferrer" onclick="setTimeout(function(){ window.location.href='thank-you.html'; }, 150);">Book Your Call</a>
  </div>

</div>

<script>
const QUESTIONS = [
  { key:'role', question:"Are you the owner?", options:["Yes","No"] },
  { key:'revenue', question:"What's your average monthly revenue?", options:["Under $20k","$20k\u2013$50k","$50k\u2013$100k","$100k+"] },
  { key:'jobsPerWeek', question:"How many jobs do you get a week?", options:["Under 5","5\u201310","10\u201320","20+"] },
  { key:'painPoint', question:"What's costing you the most right now?", options:["Missed calls","Crews sitting idle between jobs","Losing jobs to faster-responding competitors","Insurance claim delays","Not sure, just overwhelmed"] },
  { key:'afterHours', question:"Do you currently have a dedicated person answering after hours emergency calls, or does it go to voicemail?", options:["Yes, dedicated person","No, goes to voicemail","Sometimes, it's inconsistent"] }
];
const TOTAL_STEPS = QUESTIONS.length + 1;

let step = 0;
const answers = {};
const contact = { name:'', phone:'', email:'' };
let submitted = false;

const card = document.getElementById('card');
const topRow = document.getElementById('topRow');
const progressTrack = document.getElementById('progressTrack');
const progressFill = document.getElementById('progressFill');
const stepLabel = document.getElementById('stepLabel');
const backBtn = document.getElementById('backBtn');
const questionArea = document.getElementById('questionArea');
const contactForm = document.getElementById('contactForm');
const confirmStep = document.getElementById('confirmStep');

backBtn.addEventListener('click', () => {
  if(step > 0){
    step -= 1;
    render();
  }
});

function selectOption(key, value, btnEl){
  answers[key] = value;
  const siblings = btnEl.parentElement.querySelectorAll('.option-btn');
  siblings.forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  setTimeout(() => {
    step = Math.min(step + 1, TOTAL_STEPS - 1);
    render();
  }, 220);
}

function renderQuestionStep(){
  const q = QUESTIONS[step];
  const optionsHtml = q.options.map(opt => {
    const selected = answers[q.key] === opt ? 'selected' : '';
    return `<button type="button" class="option-btn ${selected}" data-value="${opt}">${opt}</button>`;
  }).join('');
  questionArea.innerHTML = `
    <h2 class="question">${q.question}</h2>
    <div class="options">${optionsHtml}</div>
  `;
  questionArea.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => selectOption(q.key, btn.dataset.value, btn));
  });
}

function validateContact(){
  let valid = true;
  document.getElementById('errName').textContent = '';
  document.getElementById('errPhone').textContent = '';
  document.getElementById('errEmail').textContent = '';

  if(!contact.name.trim()){
    document.getElementById('errName').textContent = 'Enter your name';
    valid = false;
  }
  if(!contact.phone.trim()){
    document.getElementById('errPhone').textContent = 'Enter a phone number';
    valid = false;
  }
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!contact.email.trim()){
    document.getElementById('errEmail').textContent = 'Enter your email';
    valid = false;
  } else if(!emailRe.test(contact.email.trim())){
    document.getElementById('errEmail').textContent = 'Enter a valid email';
    valid = false;
  }
  return valid;
}

document.getElementById('fName').addEventListener('input', e => contact.name = e.target.value);
document.getElementById('fPhone').addEventListener('input', e => contact.phone = e.target.value);
document.getElementById('fEmail').addEventListener('input', e => contact.email = e.target.value);

contactForm.addEventListener('submit', async e => {
  e.preventDefault();
  if(!validateContact()) return;

  const payload = { ...answers, ...contact };
  const submitBtn = document.getElementById('submitBtn');
  const errSubmit = document.getElementById('errSubmit');
  errSubmit.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';

  try {
    const res = await fetch('https://formspree.io/f/mqerzjvb', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      throw new Error('Submission failed');
    }

    if (typeof fbq === 'function') {
      fbq('track', 'Lead');
    }

    submitted = true;
    render();
  } catch (err) {
    errSubmit.textContent = "Something went wrong sending your application. Please try again.";
    submitBtn.disabled = false;
    submitBtn.textContent = 'Apply Now';
  }
});

function render(){
  const isQuestionStep = step < QUESTIONS.length;
  const isContactStep = step === QUESTIONS.length && !submitted;

  questionArea.style.display = (!submitted && isQuestionStep) ? 'block' : 'none';
  contactForm.classList.toggle('active', isContactStep);
  confirmStep.classList.toggle('active', submitted);

  topRow.style.display = submitted ? 'none' : 'flex';
  progressTrack.style.display = submitted ? 'none' : 'block';

  if(!submitted){
    backBtn.classList.toggle('show', step > 0);
    stepLabel.textContent = `Step ${step + 1} of ${TOTAL_STEPS}`;
    const pct = Math.round(((step + 1) / TOTAL_STEPS) * 100);
    progressFill.style.width = pct + '%';
    progressFill.classList.remove('flash');
    void progressFill.offsetWidth;
    progressFill.classList.add('flash');
  }

  if(isQuestionStep && !submitted){
    renderQuestionStep();
  }
}

render();
</script>

</body>
</html>
